# Fly.io — footVSball
# Deploy: fly launch --copy-config --no-deploy && fly deploy
app = "footvsball-mc"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "2567"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Profili/valute persistenti tra deploy (volume creato: vol_rkg5oyzy9jy69xy4)
[mounts]
  source = "fvb_data"
  destination = "/app/data"
